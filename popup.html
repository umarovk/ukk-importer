<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>UKK Nilai Importer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 680px;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 12px;
      background: #f0f2f5;
      color: #333;
    }

    .topbar {
      background: #1565c0;
      color: white;
      padding: 9px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topbar h3 { font-size: 14px; flex: 1; font-weight: 600; }
    .topbar small { font-size: 10px; opacity: 0.75; }

    .toolbar {
      background: white;
      padding: 7px 12px;
      display: flex;
      gap: 5px;
      align-items: center;
      border-bottom: 1px solid #dee2e6;
    }
    .sep { flex: 1; }

    button {
      padding: 5px 11px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-blue   { background: #1565c0; color: white; }
    .btn-teal   { background: #00796b; color: white; }
    .btn-green  { background: #2e7d32; color: white; }
    .btn-red    { background: #c62828; color: white; }
    .btn-grey   { background: #546e7a; color: white; }
    .btn-orange { background: #e65100; color: white; }

    /* Penguji reference panel */
    #pengujiPanel {
      display: none;
      background: #fffde7;
      border-bottom: 2px solid #f9a825;
      padding: 7px 12px 9px;
    }
    #pengujiPanel strong {
      display: block;
      font-size: 11px;
      color: #795548;
      margin-bottom: 5px;
    }
    .tag {
      display: inline-block;
      background: #fff8e1;
      border: 1px solid #f9a825;
      border-radius: 3px;
      padding: 2px 7px;
      margin: 2px 3px 2px 0;
      cursor: pointer;
      font-size: 11px;
      user-select: none;
    }
    .tag:hover { background: #ffe082; }
    .tag.copied { background: #ffe082; border-color: #f57f17; }

    /* Table */
    .table-wrap {
      max-height: 420px;
      overflow-y: auto;
      background: white;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    thead {
      position: sticky;
      top: 0;
      z-index: 2;
    }
    thead th {
      background: #263238;
      color: white;
      padding: 6px 8px;
      text-align: left;
      font-weight: 600;
      font-size: 11px;
      white-space: nowrap;
    }
    thead th.col-no      { width: 32px; text-align: center; }
    thead th.col-nisn    { width: 100px; }
    thead th.col-nama    { }
    thead th.col-nilai   { width: 75px; }
    thead th.col-penguji { width: 190px; }

    tbody tr:nth-child(even) { background: #fafafa; }
    tbody tr:hover { background: #e3f2fd; }
    td {
      padding: 2px 6px;
      border-bottom: 1px solid #eceff1;
      vertical-align: middle;
    }
    td.col-no   { text-align: center; color: #90a4ae; font-size: 11px; }
    td.col-nisn { color: #607d8b; font-size: 11px; }

    input.cell-input {
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      padding: 4px 5px;
      font-size: 12px;
      border-radius: 3px;
      outline: none;
      color: #333;
    }
    input.cell-input:focus {
      border-color: #1565c0;
      background: white;
      box-shadow: 0 0 0 2px rgba(21,101,192,0.15);
    }
    input.cell-input.has-value { background: #e8f5e9; }
    input.cell-input.has-value:focus { background: white; }

    /* Empty state */
    #emptyState {
      text-align: center;
      padding: 36px 20px;
      color: #b0bec5;
    }
    #emptyState p { margin-top: 6px; font-size: 13px; }

    /* Status bar */
    #status {
      padding: 8px 14px;
      font-size: 12px;
      line-height: 1.5;
      display: none;
    }
    .s-success { background: #e8f5e9; color: #2e7d32; border-top: 2px solid #66bb6a; }
    .s-error   { background: #ffebee; color: #c62828; border-top: 2px solid #ef5350; }
    .s-info    { background: #e3f2fd; color: #1565c0; border-top: 2px solid #42a5f5; }
  </style>
</head>
<body>

<div class="topbar">
  <span style="font-size:18px">📊</span>
  <h3>UKK Nilai Importer</h3>
  <small id="countBadge"></small>
</div>

<div class="toolbar">
  <button class="btn-blue"   id="btnGenerate">⚡ Generate Siswa</button>
  <button class="btn-teal"   id="btnGenPenguji">👥 Daftar Penguji</button>
  <button class="btn-orange" id="btnCopyNames" disabled title="Copy semua nama siswa untuk di-paste ke Excel">📋 Copy Nama</button>
  <div class="sep"></div>
  <button class="btn-green" id="btnIsiForm" disabled>✔ Isi Form</button>
  <button class="btn-red"   id="btnReset"   disabled>↺ Reset</button>
</div>

<div id="pengujiPanel">
  <strong>Daftar Penguji Internal — klik nama untuk copy ke clipboard:</strong>
  <div id="pengujiTags"></div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th class="col-no">No</th>
        <th class="col-nisn">NISN</th>
        <th class="col-nama">Nama Siswa</th>
        <th class="col-nilai">Nilai</th>
        <th class="col-penguji">Penguji Internal</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr>
        <td colspan="5">
          <div id="emptyState">
            <div style="font-size:36px">📋</div>
            <p>Buka halaman <b>input_nilai_ukk</b>, lalu klik <b>⚡ Generate Siswa</b></p>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<div id="status"></div>
<script src="popup.js"></script>
</body>
</html>
